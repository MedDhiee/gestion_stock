global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "slack-notifications"

receivers:
  - name: "slack-notifications"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/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"
        channel: "#alerts"
        send_resolved: true
