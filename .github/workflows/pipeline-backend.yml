name: gestion-stock Backend API Pipeline

on:
  push:
    branches:
      - master
    paths:
      - "**/gestiondestock/**"
      - Docker/backend/**
      - "docker-compose.yml"
      - .github/workflows/*-backend.yml

jobs:
  compile:
    runs-on: ubuntu-latest
    name: Compile project
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"
      - name: Set execute permissions for Maven Wrapper
        run: chmod +x gestiondestock/mvnw

      - name: Running Unit Tests
        run: |
          cd gestiondestock
          ./mvnw clean compile -DskipTests
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"
      - name: Set execute permissions for Maven Wrapper
        run: chmod +x gestiondestock/mvnw

      - name: Run unit tests
        run: |
          cd gestiondestock
          ./mvnw test -DskipTests

  build:
    runs-on: ubuntu-latest
    name: Build backend
    needs: [compile, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"

      - name: Set execute permissions for Maven Wrapper
        run: chmod +x gestiondestock/mvnw

      - name: Package artifact
        run: |
          cd gestiondestock
          ./mvnw clean package -DskipTests

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"
      - name: Set execute permissions for Maven Wrapper
        run: chmod +x gestiondestock/mvnw

      - name: Extract project version
        id: extract_version
        run: |
          cd gestiondestock
          echo "VERSION=$(./mvnw -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: gestiondestock
          file: Docker/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gestiondestock-backend:${{ steps.extract_version.outputs.VERSION }},${{ secrets.DOCKERHUB_USERNAME }}/gestiondestock-backend:latest
          build-args: |
            PROFILE=dev
            APP_VERSION=${{ steps.extract_version.outputs.VERSION }}
  scan-image:
    name: Scan Docker Image with Trivy
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan Docker image with Trivy
        run: |
          trivy image ${{ secrets.DOCKERHUB_USERNAME }}/gestiondestock-backend:${{ steps.extract_version.outputs.VERSION }}

