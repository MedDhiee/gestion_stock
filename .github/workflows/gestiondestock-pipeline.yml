name: gestiondestock CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  SERVICE_PATH: gestiondestock
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
  IMAGE_TAG: ${{ vars.IMAGE_TAG }}
  ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY }}

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        env:
          CI: "true"
        run: bash mvnw -B test -Dtest='!*ApplicationTests' -DfailIfNoTests=false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build application
        run: bash mvnw -B -DskipTests clean compile

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package application
        run: bash mvnw -B -DskipTests package

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.dockerfile_check.outputs.dockerfile_exists == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: ${{ steps.dockerfile_check.outputs.dockerfile_exists == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: ${{ steps.dockerfile_check.outputs.dockerfile_exists == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/gestiondestock
          push: true
          tags: ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_TAG }}

  upload_artifact:
    name: Upload Artifact
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package application for artifact
        working-directory: ${{ github.workspace }}/gestiondestock
        run: bash mvnw -B -DskipTests package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-artifacts
          path: gestiondestock/target/**
          if-no-files-found: warn

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: upload_artifact
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security_scan
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        working-directory: ${{ github.workspace }}/gestiondestock
        run: |
          echo 'Example deploy: java -jar target/*.jar'
          echo 'Example deploy: kubectl rollout restart deployment/backend'