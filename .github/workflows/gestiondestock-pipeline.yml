name: gestiondestock CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  SERVICE_PATH: gestiondestock
  JAVA_VERSION: '17'
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ vars.IMAGE_TAG }}
  ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        env:
          CI: "true"
        run: bash mvnw -B test -Dtest='!*ApplicationTests' -DfailIfNoTests=false

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build project
        run: bash mvnw -B -DskipTests clean compile

  package:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Package application
        run: bash mvnw -B -DskipTests package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-package
          path: |
            ${{ github.workspace }}/${{ env.SERVICE_PATH }}/target/**

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "${{ github.workspace }}/${{ env.SERVICE_PATH }}/Dockerfile" ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
          push: true
          tags: ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_USERNAME }}/gestiondestock:${{ env.IMAGE_TAG }}

  upload_artifact:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gestiondestock-package
          path: ${{ github.workspace }}/${{ env.SERVICE_PATH }}/target

      - name: Upload to release storage
        run: |
          echo "Artifacts downloaded to ${{ github.workspace }}/${{ env.SERVICE_PATH }}/target"
          echo "Upload artifact step completed"

  security_scan:
    runs-on: ubuntu-latest
    needs: upload_artifact
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    runs-on: ubuntu-latest
    needs: security_scan
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "Example deploy: java -jar target/*.jar"
          echo "Example deploy: kubectl rollout restart deployment/backend"