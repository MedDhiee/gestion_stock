name: gestiondestock-ci-cd

on:
  push:
    branches:
      - master
  pull_request:

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ secrets.REGISTRY_HOST }}/gestiondestock:${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: bash mvnw -B test -Dtest='!*ApplicationTests' -DfailIfNoTests=false
        env:
          CI: "true"

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build application
        run: bash mvnw -B -DskipTests clean compile

  package:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package application
        run: bash mvnw -B -DskipTests package

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-artifacts
          path: gestiondestock/target/**

  upload_artifact:
    needs: package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: gestiondestock-artifacts
          path: gestiondestock/target

      - name: Set up Docker Buildx
        if: ${{ hashFiles('gestiondestock/Dockerfile') != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: ${{ hashFiles('gestiondestock/Dockerfile') != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: ${{ hashFiles('gestiondestock/Dockerfile') != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/gestiondestock
          push: true
          tags: ${{ env.IMAGE_TAG }}

  security_scan:
    needs: upload_artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    needs: security_scan
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "Example deploy: java -jar target/*.jar"
          echo "Example deploy: kubectl rollout restart deployment/backend"