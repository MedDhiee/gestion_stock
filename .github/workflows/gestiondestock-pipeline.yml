# generated-at: 2026-05-11 09:46:14 UTC
name: gestiondestock-pipeline
on:
  push:
    branches: [ master ]
  pull_request:

env:
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_NAME: gestiondestock
  IMAGE_TAG: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository_owner }}/gestiondestock:${{ github.sha }}
  ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY || 'false' }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Runtime setup info
        run: |
          echo 'Using Java runtime'
      - name: Make Maven wrapper executable
        run: chmod +x mvnw
      - name: Unit tests
        run: |
          ./mvnw -B test

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build
        run: |
          ./mvnw -B -DskipTests clean compile

  package:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Package + Docker build/push
        run: |
          ./mvnw -B -DskipTests package
          if [ -f Dockerfile ]; then
            if [ -n "${REGISTRY_USERNAME:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
              echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
            fi
            docker build -f Dockerfile -t "$IMAGE_TAG" .
            docker push "$IMAGE_TAG"
          else
            echo 'Dockerfile not found; skipping image build and push.'
          fi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-artifact
          path: |
            gestiondestock/target/**
          if-no-files-found: warn

  security-scan:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gestiondestock-artifact
          path: artifact-output
        continue-on-error: true
      - name: Filesystem security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo 'Example deploy: java -jar target/*.jar'
          echo 'Example deploy: kubectl rollout restart deployment/backend'
