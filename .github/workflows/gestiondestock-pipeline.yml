name: CI/CD Pipeline for gestiondestock

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  SERVICE_DIR: gestiondestock
  IMAGE_NAME: gestiondestock

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: gestiondestock

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run unit tests
        working-directory: ${{ github.workspace }}/gestiondestock
        run: mvn -B test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: gestiondestock

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build (compile)
        working-directory: ${{ github.workspace }}/gestiondestock
        run: mvn -B -DskipTests clean compile

  package:
    needs: build
    runs-on: ubuntu-latest
    env:
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      IMAGE_TAG: ${{ secrets.IMAGE_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: gestiondestock

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Package application
        working-directory: ${{ github.workspace }}/gestiondestock
        run: mvn -B -DskipTests package

      - name: Check for Dockerfile
        id: check_dockerfile
        working-directory: ${{ github.workspace }}/gestiondestock
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Container Registry
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: steps.check_dockerfile.outputs.exists == 'true'
        working-directory: ${{ github.workspace }}/gestiondestock
        run: |
          docker build -t ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker push ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  upload_artifact:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: gestiondestock

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-artifacts
          path: ${{ github.workspace }}/gestiondestock/target/
          retention-days: 5

  security_scan:
    needs: package
    runs-on: ubuntu-latest
    env:
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      IMAGE_TAG: ${{ secrets.IMAGE_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Pull Docker image
        run: docker pull ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

  deploy:
    needs: security_scan
    runs-on: ubuntu-latest
    env:
      ENABLE_DEPLOY: ${{ secrets.ENABLE_DEPLOY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: gestiondestock

      - name: Deploy
        if: github.ref == 'refs/heads/main' && env.ENABLE_DEPLOY == 'true'
        working-directory: ${{ github.workspace }}/gestiondestock
        run: |
          echo "Deploying gestiondestock..."
          # Example deploy commands
          # java -jar target/*.jar
          # kubectl rollout restart deployment/backend
          echo "Deployment step completed."