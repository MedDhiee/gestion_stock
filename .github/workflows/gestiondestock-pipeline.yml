name: Gestion de Stock CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          path: 'gestiondestock'

      - name: Set up Maven
        uses: actions/setup-maven@v2

      - name: Unit tests
        run: |
          bash mvnw -B test -Dtest='!*ApplicationTests' -DfailIfNoTests=false
        working-directory: '${{ github.workspace }}/gestiondestock'

      - name: Build
        run: |
          bash mvnw -B -DskipTests clean compile
        working-directory: '${{ github.workspace }}/gestiondestock'

      - name: Package
        run: |
          bash mvnw -B -DskipTests package
        working-directory: '${{ github.workspace }}/gestiondestock'

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: gestiondestock
          path: '${{ github.workspace }}/gestiondestock/target/**'

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          image: '$(echo $REGISTRY_HOST)/$(echo $GITHUB_REPOSITORY):$(echo $GITHUB_SHA)'
          format: 'sarif'
          output: 'trivy-sarif.json'
          severity: 'CRITICAL,HIGH'

      - name: Deploy
        if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.ENABLE_DEPLOY == 'true' }}
        run: |
          echo 'Example deploy: java -jar target/*.jar'
          echo 'Example deploy: kubectl rollout restart deployment/backend'
        working-directory: '${{ github.workspace }}/gestiondestock'
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          ENABLE_DEPLOY: ${{ github.event.inputs.ENABLE_DEPLOY }}