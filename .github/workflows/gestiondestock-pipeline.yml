name: gestiondestock-pipeline
on:
  push:
    branches: [ master, main ]
  pull_request:

env:
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_NAME: gestiondestock
  IMAGE_TAG: ${{ env.REGISTRY_HOST }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
  ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY || 'false' }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "C:/Users/meddh/Downloads/PFE_TALAN/gestion_stock/gestiondestock"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Runtime setup info
        run: |
          echo 'Using Java runtime'
      - name: Unit tests
        run: |
          mvn -B test

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "C:/Users/meddh/Downloads/PFE_TALAN/gestion_stock/gestiondestock"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build
        run: |
          mvn -B -DskipTests clean compile

  package:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "C:/Users/meddh/Downloads/PFE_TALAN/gestion_stock/gestiondestock"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Package + Docker build/push
        run: |
          mvn -B -DskipTests package
          if [ -f Dockerfile ]; then
            if [ -n "${REGISTRY_USERNAME:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
              echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
            fi
            docker build -f Dockerfile -t "$IMAGE_TAG" .
            docker push "$IMAGE_TAG"
          else
            echo 'Dockerfile not found; skipping image build and push.'
          fi

  upload-artifact:
    needs: package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "C:/Users/meddh/Downloads/PFE_TALAN/gestion_stock/gestiondestock"
    steps:
      - uses: actions/checkout@v4
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-artifact
          path: |
            target/**

  security-scan:
    needs: upload-artifact
    runs-on: ubuntu-latest
    steps:
      - name: Container security scan
        run: |
          if [ -n "${IMAGE_TAG:-}" ]; then
            docker run --rm aquasec/trivy:0.57.1 image --no-progress --severity HIGH,CRITICAL --exit-code 1 "$IMAGE_TAG"
          else
            echo 'IMAGE_TAG is empty; skipping image scan.'
          fi

  deploy:
    if: github.ref == 'refs/heads/main' && env.ENABLE_DEPLOY == 'true'
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "C:/Users/meddh/Downloads/PFE_TALAN/gestion_stock/gestiondestock"
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo 'Example deploy: java -jar target/*.jar'
          echo 'Example deploy: kubectl rollout restart deployment/backend'
