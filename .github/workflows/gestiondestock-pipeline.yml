name: gestiondestock-ci-cd

on:
  push:
    branches:
      - master
  pull_request:

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ secrets.REGISTRY_HOST }}/gestiondestock:${{ github.sha }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: bash mvnw -B test -Dtest='!*ApplicationTests' -DfailIfNoTests=false
        env:
          CI: "true"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile source code
        run: bash mvnw -B -DskipTests clean compile

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package application
        run: bash mvnw -B -DskipTests package

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-artifacts
          path: gestiondestock/target/**

      - name: Conditional Docker Build and Push
        run: |
          if [ -f Dockerfile ]; then
            echo "Dockerfile found. Building and pushing Docker image..."
            echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USERNAME}" --password-stdin
            docker build -t "${IMAGE_TAG}" .
            docker push "${IMAGE_TAG}"
          else
            echo "Dockerfile not found. Skipping Docker build and push."
          fi

  upload_artifact:
    name: Upload Artifact
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: gestiondestock-artifacts
          path: gestiondestock/target

      - name: Publish build/package outputs
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-published-artifacts
          path: gestiondestock/target/**

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: upload_artifact
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filesystem security scan
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_OFFLINE_SCAN: "true"
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security_scan
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download published artifacts
        uses: actions/download-artifact@v4
        with:
          name: gestiondestock-published-artifacts
          path: gestiondestock/target

      - name: Execute deployment
        run: |
          echo 'Example deploy: java -jar target/*.jar'
          echo 'Example deploy: kubectl rollout restart deployment/backend'