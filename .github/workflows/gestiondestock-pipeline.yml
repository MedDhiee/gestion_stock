name: gestiondestock-ci-cd

on:
  push:
    branches:
      - main
    paths:
      - 'gestiondestock/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run unit tests
        run: bash mvnw -B test -Dtest='!*ApplicationTests' -DfailIfNoTests=false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Compile source code
        run: bash mvnw -B -DskipTests clean compile

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    outputs:
      docker_image: ${{ steps.docker_meta.outputs.image }}
      docker_build: ${{ steps.docker_check.outputs.build }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Package application
        run: bash mvnw -B -DskipTests package

      - name: Check for Dockerfile
        id: docker_check
        run: |
          if [ -f Dockerfile ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.docker_check.outputs.build == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: ${{ steps.docker_check.outputs.build == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate Docker Image Tag
        if: ${{ steps.docker_check.outputs.build == 'true' }}
        id: docker_meta
        run: |
          IMAGE_TAG="${{ vars.IMAGE_TAG || github.sha }}"
          echo "image=${{ env.REGISTRY_HOST }}/${{ github.repository }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        if: ${{ steps.docker_check.outputs.build == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/gestiondestock
          push: true
          tags: ${{ steps.docker_meta.outputs.image }}

  upload_artifact:
    name: Upload Artifact
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Repackage for artifact upload
        run: bash mvnw -B -DskipTests package
        working-directory: ${{ github.workspace }}/gestiondestock

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-artifacts
          path: gestiondestock/target/**
          retention-days: 7

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '${{ github.workspace }}/gestiondestock'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner on Docker image
        if: ${{ needs.package.outputs.docker_build == 'true' }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ needs.package.outputs.docker_image }}'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [upload_artifact, security_scan]
    if: ${{ github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo 'Example deploy: java -jar target/*.jar'
          echo 'Example deploy: kubectl rollout restart deployment/backend'