name: gestiondestock CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  SERVICE_PATH: gestiondestock
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ vars.IMAGE_TAG }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        env:
          CI: "true"
        run: bash mvnw -B test -Dtest='!*ApplicationTests' -DfailIfNoTests=false

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build project
        run: bash mvnw -B -DskipTests clean compile

  package:
    name: package
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package application
        run: bash mvnw -B -DskipTests package

      - name: Check for Dockerfile
        id: check-dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.check-dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: ${{ steps.check-dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: ${{ steps.check-dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/gestiondestock
          push: true
          tags: ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_USERNAME }}/${{ env.IMAGE_TAG }}

  upload_artifact:
    name: upload_artifact
    runs-on: ubuntu-latest
    needs: package
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package application for artifact
        run: bash mvnw -B -DskipTests package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gestiondestock-artifacts
          path: gestiondestock/target/**

  security_scan:
    name: security_scan
    runs-on: ubuntu-latest
    needs: upload_artifact
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filesystem security scan
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_OFFLINE_SCAN: "true"
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: security_scan
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestiondestock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package application for deployment
        run: bash mvnw -B -DskipTests package

      - name: Deploy application
        run: |
          echo 'Example deploy: java -jar target/*.jar'
          echo 'Example deploy: kubectl rollout restart deployment/backend'