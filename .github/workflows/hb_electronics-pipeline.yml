name: CI/CD Pipeline for hb_electronics

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  SERVICE_PATH: gestion_stock_ui/hb_electronics

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Run unit tests
        env:
          CI: "true"
        run: |
          npm ci
          npm test -- --watch=false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Build application
        run: |
          npm ci
          npm run build

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Package application
        run: |
          npm ci
          npm run build
          npm pack

      - name: Check for Dockerfile
        id: check-dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.check-dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        if: ${{ steps.check-dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: ${{ steps.check-dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
          push: true
          tags: ${{ env.IMAGE_TAG }}

  upload_artifact:
    name: Upload Artifact
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Build and package for artifact
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
        run: |
          npm ci
          npm run build
          npm pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hb_electronics-artifacts
          path: |
            gestion_stock_ui/hb_electronics/dist/**
            gestion_stock_ui/hb_electronics/*.tgz
          if-no-files-found: warn

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: upload_artifact
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filesystem security scan
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_OFFLINE_SCAN: "true"
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security_scan
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo 'Example deploy: kubectl apply -f k8s/'
          echo 'Example deploy: helm upgrade --install app ./chart'