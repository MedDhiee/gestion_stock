name: CI/CD hb_electronics

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ secrets.IMAGE_TAG }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Run unit tests
        env:
          CI: "true"
        run: |
          npm ci
          npm test -- --watch=false

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Build application
        run: |
          npm ci
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            gestion_stock_ui/hb_electronics/dist/**
          retention-days: 5

  package:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: gestion_stock_ui/hb_electronics/dist

      - name: Package application
        run: |
          npm ci
          npm pack

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-outputs
          path: |
            gestion_stock_ui/hb_electronics/dist/**
            gestion_stock_ui/hb_electronics/*.tgz
          retention-days: 5

      - name: Docker build and push
        run: |
          if [ -f Dockerfile ]; then
            echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USERNAME}" --password-stdin
            docker build -t "${REGISTRY_HOST}/${IMAGE_TAG}" .
            docker push "${REGISTRY_HOST}/${IMAGE_TAG}"
          else
            echo "Dockerfile not found. Skipping Docker build and push."
          fi

  upload_artifact:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-outputs
          path: gestion_stock_ui/hb_electronics

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: final-artifacts
          path: |
            gestion_stock_ui/hb_electronics/dist/**
            gestion_stock_ui/hb_electronics/*.tgz
          retention-days: 7

  security_scan:
    runs-on: ubuntu-latest
    needs: upload_artifact
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filesystem security scan
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_OFFLINE_SCAN: "true"
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    runs-on: ubuntu-latest
    needs: security_scan
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download final artifacts
        uses: actions/download-artifact@v4
        with:
          name: final-artifacts
          path: gestion_stock_ui/hb_electronics

      - name: Deploy application
        run: |
          echo 'Example deploy: kubectl apply -f k8s/'
          echo 'Example deploy: helm upgrade --install app ./chart'