name: hb_electronics CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Unit tests
        run: |
          npm ci
          npm test -- --watch=false

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Package
        run: |
          npm pack

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: hb_electronics
          path: gestion_stock_ui/hb_electronics/dist/**,gestion_stock_ui/hb_electronics/*.tgz

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          image: ${{ github.sha }}
          format: json
          output: /tmp/trivy.json
          severity: CRITICAL,HIGH
          fail-on: CRITICAL,HIGH

      - name: Deploy
        if: ${{ github.ref == 'refs/heads/main' && env.ENABLE_DEPLOY == 'true' }}
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo 'Example deploy: kubectl apply -f k8s/'
          echo 'Example deploy: helm upgrade --install app ./chart'