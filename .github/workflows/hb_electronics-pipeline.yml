name: hb-electronics-pipeline
on:
  push:
    branches: [ master ]
  pull_request:

env:
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_NAME: hb-electronics
  IMAGE_TAG: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}/${{ github.repository_owner }}/hb-electronics:${{ github.sha }}
  ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY || 'false' }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Runtime setup info
        run: |
          echo 'Using Node.js runtime'
      - name: Unit tests
        run: |
          npm ci
          npm test -- --watch=false

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: |
          npm ci
          npm run build

  package:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Package + Docker build/push
        run: |
          npm pack
          if [ -f Dockerfile ]; then
            if [ -n "${REGISTRY_USERNAME:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
              echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
            fi
            docker build -f Dockerfile -t "$IMAGE_TAG" .
            docker push "$IMAGE_TAG"
          else
            echo 'Dockerfile not found; skipping image build and push.'
          fi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hb-electronics-artifact
          path: |
            gestion_stock_ui/hb_electronics/dist/**
            gestion_stock_ui/hb_electronics/*.tgz
          if-no-files-found: warn

  security-scan:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Container image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
        env:
          TRIVY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  deploy:
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo 'Example deploy: kubectl apply -f k8s/'
          echo 'Example deploy: helm upgrade --install app ./chart'
