name: hb_electronics CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'gestion_stock_ui/hb_electronics/**'
  pull_request:
    branches:
      - main
    paths:
      - 'gestion_stock_ui/hb_electronics/**'

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ secrets.REGISTRY_HOST }}/hb_electronics:${{ github.sha }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Run test commands
        run: |
          npm ci
          npm test -- --watch=false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Run build commands
        run: |
          npm ci
          npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            ${{ github.workspace }}/gestion_stock_ui/hb_electronics/dist
          retention-days: 5

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ${{ github.workspace }}/gestion_stock_ui/hb_electronics/dist

      - name: Run package commands
        run: |
          npm ci
          npm pack

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Container Registry
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
          push: true
          tags: ${{ env.IMAGE_TAG }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-output
          path: |
            ${{ github.workspace }}/gestion_stock_ui/hb_electronics/dist
            ${{ github.workspace }}/gestion_stock_ui/hb_electronics/*.tgz
          retention-days: 5

  upload_artifact:
    name: Upload Artifact
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-output
          path: ${{ github.workspace }}/gestion_stock_ui/hb_electronics

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hb_electronics-final-artifacts
          path: |
            ${{ github.workspace }}/gestion_stock_ui/hb_electronics/dist
            ${{ github.workspace }}/gestion_stock_ui/hb_electronics/*.tgz
          retention-days: 30

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: package
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy vulnerability scanner
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [upload_artifact, security_scan]
    if: ${{ github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download final artifacts
        uses: actions/download-artifact@v4
        with:
          name: hb_electronics-final-artifacts
          path: ${{ github.workspace }}/gestion_stock_ui/hb_electronics

      - name: Execute deploy commands
        run: |
          echo 'Example deploy: kubectl apply -f k8s/'
          echo 'Example deploy: helm upgrade --install app ./chart'