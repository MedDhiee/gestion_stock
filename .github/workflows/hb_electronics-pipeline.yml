name: CI/CD Pipeline for hb_electronics

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CI: "true"
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ github.sha }}
  ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gestion_stock_ui/hb_electronics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json
      - run: npm ci
      - run: npm test -- --watch=false

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gestion_stock_ui/hb_electronics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: hb_electronics-package
          path: gestion_stock_ui/hb_electronics/*.tgz

  security_scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

  package:
    needs: security_scan
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: gestion_stock_ui/hb_electronics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_USERNAME }}/hb_electronics:${{ env.IMAGE_TAG }} .
      - name: Push Docker image
        run: |
          echo ${{ env.REGISTRY_PASSWORD }} | docker login ${{ env.REGISTRY_HOST }} -u ${{ env.REGISTRY_USERNAME }} --password-stdin
          docker push ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_USERNAME }}/hb_electronics:${{ env.IMAGE_TAG }}

  deploy:
    needs: package
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes
        run: |
          echo "Example deploy: kubectl apply -f k8s/"
          echo "Example deploy: helm upgrade --install app ./chart"