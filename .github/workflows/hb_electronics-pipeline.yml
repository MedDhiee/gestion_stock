name: CI/CD Pipeline for hb_electronics

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CI: "true"
  SERVICE_PATH: gestion_stock_ui/hb_electronics
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ vars.IMAGE_TAG }}
  ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false
        env:
          CI: "true"

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

  package:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    outputs:
      image_built: ${{ steps.docker_build.outputs.image_built }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Package application
        run: |
          npm ci
          npm pack

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
          push: true
          tags: ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image built output
        if: ${{ steps.check_dockerfile.outputs.dockerfile_exists == 'true' }}
        run: echo "image_built=true" >> $GITHUB_OUTPUT
        id: set_output

  upload_artifact:
    runs-on: ubuntu-latest
    needs: package
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Rebuild and package for artifact
        run: |
          npm ci
          npm run build
          npm pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hb_electronics-build
          path: |
            ${{ github.workspace }}/${{ env.SERVICE_PATH }}/dist/**
            ${{ github.workspace }}/${{ env.SERVICE_PATH }}/*.tgz
          if-no-files-found: warn

  security_scan:
    runs-on: ubuntu-latest
    needs: upload_artifact
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

  deploy:
    runs-on: ubuntu-latest
    needs: security_scan
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "Example deploy: kubectl apply -f k8s/'"
          echo "Example deploy: helm upgrade --install app ./chart'"