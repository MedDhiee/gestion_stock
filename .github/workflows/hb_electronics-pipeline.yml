name: hb_electronics CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}
  REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ github.sha }}
  ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY || 'false' }}

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: C:/Users/meddh/AppData/Local/Temp/devops_multi_agents_repo_0c6dcw3u/gestion_stock_ui/hb_electronics

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: C:/Users/meddh/AppData/Local/Temp/devops_multi_agents_repo_0c6dcw3u

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm packages
        uses: actions/cache@v3
        with:
          path: C:/Users/meddh/AppData/Local/Temp/devops_multi_agents_repo_0c6dcw3u/gestion_stock_ui/hb_electronics/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('C:/Users/meddh/AppData/Local/Temp/devops_multi_agents_repo_0c6dcw3u/gestion_stock_ui/hb_electronics/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false

      - name: Build application
        run: npm run build

      - name: Package application
        run: npm pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hb_electronics-dist
          path: C:/Users/meddh/AppData/Local/Temp/devops_multi_agents_repo_0c6dcw3u/gestion_stock_ui/hb_electronics/dist
          retention-days: 30

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: hb_electronics-tgz
          path: C:/Users/meddh/AppData/Local/Temp/devops_multi_agents_repo_0c6dcw3u/gestion_stock_ui/hb_electronics/*.tgz
          retention-days: 30

      - name: Detect Dockerfile presence
        id: dockerfile_exists
        run: |
          $exists = Test-Path "C:/Users/meddh/AppData/Local/Temp/devops_multi_agents_repo_0c6dcw3u/gestion_stock_ui/hb_electronics/Dockerfile"
          if ($exists) { $value = "true" } else { $value = "false" }
          echo "exists=$value" >> $env:GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.dockerfile_exists.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: steps.dockerfile_exists.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: steps.dockerfile_exists.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: C:/Users/meddh/AppData/Local/Temp/devops_multi_agents_repo_0c6dcw3u/gestion_stock_ui/hb_electronics
          push: true
          tags: ${{ env.REGISTRY_HOST }}/hb_electronics:${{ env.IMAGE_TAG }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Security scan with Trivy
        if: steps.dockerfile_exists.outputs.exists == 'true'
        uses: aquasec/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/hb_electronics:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Deploy (optional)
        if: github.ref == 'refs/heads/main' && env.ENABLE_DEPLOY == 'true'
        run: |
          echo "Example deploy: kubectl apply -f k8s/"
          # helm upgrade --install app ./chart --set image.tag=${{ env.IMAGE_TAG }}