name: CI/CD hb_electronics

on:
  push:
    branches:
      - master
  pull_request:

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Run unit tests
        run: |
          npm ci
          npm test -- --watch=false
        env:
          CI: "true"

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Run build
        run: |
          npm ci
          npm run build

  package:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Run package
        run: |
          npm ci
          npm pack

      - name: Build and push Docker image
        if: ${{ hashFiles(format('{0}/Dockerfile', github.workspace)) != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
          push: ${{ env.REGISTRY_HOST != '' }}
          tags: ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_USERNAME }}/hb_electronics:${{ env.IMAGE_TAG }}

  upload_artifact:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload build and package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hb_electronics-artifacts
          path: |
            gestion_stock_ui/hb_electronics/dist/**
            gestion_stock_ui/hb_electronics/*.tgz
          retention-days: 5

  security_scan:
    runs-on: ubuntu-latest
    needs: upload_artifact
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy:
    runs-on: ubuntu-latest
    needs: security_scan
    if: ${{ github.ref == 'refs/heads/master' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run deploy commands
        run: |
          echo 'Example deploy: kubectl apply -f k8s/'
          echo 'Example deploy: helm upgrade --install app ./chart'