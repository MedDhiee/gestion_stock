name: CI/CD hb_electronics

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_TAG: ${{ secrets.REGISTRY_HOST }}/hb-electronics:${{ github.sha }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Run tests
        run: |
          npm ci
          npm test -- --watch=false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Run build
        run: |
          npm ci
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: gestion_stock_ui/hb_electronics/dist/**

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gestion_stock_ui/hb_electronics/package-lock.json

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: gestion_stock_ui/hb_electronics/dist

      - name: Run npm pack
        run: npm pack

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-output
          path: gestion_stock_ui/hb_electronics/*.tgz

      - name: Log in to Docker registry
        if: ${{ env.REGISTRY_HOST != '' }}
        run: echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Build and push Docker image
        if: ${{ env.REGISTRY_HOST != '' }}
        run: |
          if [ -f Dockerfile ]; then
            docker build -t "${IMAGE_TAG}" .
            docker push "${IMAGE_TAG}"
            echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          else
            echo "Dockerfile not found. Skipping Docker build and push."
          fi

  upload_artifact:
    name: Upload Artifact
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-output
          path: gestion_stock_ui/hb_electronics

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: gestion_stock_ui/hb_electronics/dist

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hb_electronics_artifacts
          path: |
            gestion_stock_ui/hb_electronics/dist/**
            gestion_stock_ui/hb_electronics/*.tgz

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan Docker image with Trivy
        if: ${{ env.IMAGE_TAG != '' }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [upload_artifact, security_scan]
    if: ${{ github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/gestion_stock_ui/hb_electronics
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute deploy commands
        run: |
          echo 'Example deploy: kubectl apply -f k8s/'
          echo 'Example deploy: helm upgrade --install app ./chart'